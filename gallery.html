<!DOCTYPE html>
<html>
<head>
<title>Gallery - Healthy Life Medical Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f8f8ff;
    margin:0;
}

header, footer{
    background:#6a5acd;
    color:white;
    text-align:center;
    padding:20px;
}

.content{
    padding:30px;
}

h2{
    color:#6a5acd;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    margin-top:20px;
}

.gallery-item{
    position:relative;
    overflow:hidden;
    border-radius:10px;
    box-shadow:0px 0px 10px #ccc;
    cursor:pointer;
}

.gallery-item img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.4s;
}

.gallery-item:hover img{
    transform:scale(1.1);
}

.gallery-item p{
    position:absolute;
    bottom:0;
    background:rgba(0,0,0,0.6);
    color:white;
    width:100%;
    margin:0;
    padding:8px;
    text-align:center;
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}
</style>

</head>

<body>

<header>
    <h1>Our Gallery</h1>
</header>

<div class="content">

<h2>🏥 Store & Facilities</h2>

<div class="gallery">

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical1.jpg">
    <p>Medical Store Interior</p>
</div>

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical2.jpg">
    <p>Medicine Display Section</p>
</div>

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical3.jpg">
    <p>Lab Testing Area</p>
</div>

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical4.jpg">
    <p>Doctor Consultation Room</p>
</div>

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical5.jpg">
    <p>Health Equipment Section</p>
</div>

<div class="gallery-item" onclick="openLightbox(this)">
    <img src="medical6.jpg">
    <p>Customer Service Counter</p>
</div>

</div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
function openLightbox(element){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src = element.querySelector("img").src;
}

function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
