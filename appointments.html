<!DOCTYPE html>
<html>
<head>
<title>Book Appointment - Healthy Life Medical Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#e6ffe6;
    margin:0;
}

header, footer{
    background:#009933;
    color:white;
    text-align:center;
    padding:20px;
}

form{
    background:white;
    width:60%;
    margin:30px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px #ccc;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin:8px 0 15px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#009933;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#006622;
}
</style>

</head>

<body>

<header>
    <h1>Book Your Appointment</h1>
</header>

<form>

<label>Full Name:</label>
<input type="text" placeholder="Enter your full name" required>

<label>Age:</label>
<input type="number" placeholder="Enter your age" required>

<label>Gender:</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Phone Number:</label>
<input type="tel" placeholder="Enter phone number" required>

<label>Email:</label>
<input type="email" placeholder="Enter email address">

<label>Select Doctor:</label>
<select required>
<option value="">Choose Doctor</option>
<option>Dr. Kumar - General Physician</option>
<option>Dr. Priya - Pediatrician</option>
<option>Dr. Arjun - Cardiologist</option>
<option>Dr. Meena - Gynecologist</option>
</select>

<label>Appointment Date:</label>
<input type="date" required>

<label>Preferred Time Slot:</label>
<select required>
<option value="">Select Time</option>
<option>9:00 AM - 10:00 AM</option>
<option>10:00 AM - 11:00 AM</option>
<option>11:00 AM - 12:00 PM</option>
<option>2:00 PM - 3:00 PM</option>
<option>3:00 PM - 4:00 PM</option>
</select>

<label>Symptoms / Reason for Visit:</label>
<textarea rows="4" placeholder="Describe your symptoms"></textarea>

<label>Payment Method:</label>
<select>
<option>Pay at Hospital</option>
<option>Online Payment</option>
<option>UPI</option>
<option>Card</option>
</select>

<button type="submit">Confirm Appointment</button>

</form>
<a href="C:\Users\hp\OneDrive\wp\lab.html">Next</a>

</body>
</html>
